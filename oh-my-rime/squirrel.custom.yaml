patch:
  "style/font_face": "PingFangSC, Segoe UI Emoji:30:39, Segoe UI Emoji:23:23, Segoe UI Emoji:2a:2a, Segoe UI Emoji:fe0f:fe0f, Segoe UI Emoji:20e3:20e3, 更纱黑体 UI SC, Microsoft YaHei::medium"
  "style/label_font_face": "PingFangSC, 更纱黑体 UI SC::light, Microsoft YaHei::light"
  "style/comment_font_face": "PingFangSC, 更纱黑体 UI SC::light:italic, Microsoft YaHei::light:italic"
  "style/font_point": 14
  "style/label_font_point": 10
  "style/comment_font_point": 10

  "style/color_scheme": nord
  "style/color_scheme_dark": nord_dark

  "style/inline_preedit": true
  "style/preedit_type": composition

  "style/text_orientation": horizontal
  "style/candidate_format": "%c\u2005%@\u2005" # 编号 %c 和候选词 %@ 前后的空间
  "style/candidate_list_layout": linear   # 候选排布：层叠 stacked | 行 linear
  "style/translucency": true
  "style/mutual_exclusive": true
  "style/corner_radius": 15.0
  "style/hilited_corner_radius": 13.0
  "style/border_height": -5.0
  "style/border_width": -5.0
  "style/line_spacing": 4.0
  "style/alpha": 1
  "style/shadow_size": 1.0
  "style/color_space": display_p3
  # "style/layout/border_width": 0

  "preset_color_schemes/nord": # 在 `style/color_schema` 指定的配色方案值
    name: "远山／Nord"                       # 方案设置中显示的配色名称
    author: aixmoyu                           # 配色作者名称
    color_format: abgr # 颜色格式：argb（0xaarrggbb）；rgba（0xrrggbbaa）；abgr（0xaabbggrr 默认）
    # 默认配色
    text_color: 0xE640342E                   # 文字
    shadow_color: 0xB4000000                 # 阴影
    label_color: 0xE66A564C                     # 标签
    comment_text_color: 0xE67087D0           # 注释
    border_color: 0x80F4EFEC                 # 边框
    back_color: 0x80F4EFEC                   # 背景
    # 普通候选项配色
    # candidate_back_color: 0x80E6F4EFEC      # 背景
    # candidate_border_color:                # 边框
    # candidate_shadow_color:                # 阴影
    candidate_text_color: 0xE640342E           # 文字
    # 编码区域配色
    hilited_text_color: 0xFF40342E             # 文字
    hilited_back_color: 0xFFBBBC8F             # 背景
    # hilited_shadow_color:                  # 阴影
    # 选中的候选区域配色
    hilited_mark_color: 0xFF7087D0             # 标签前的标记
    hilited_label_color: 0xFF40342E            # 标签
    hilited_comment_text_color: 0xFF7087D0     # 注释
    hilited_candidate_text_color: 0xFF40342E   # 文字
    hilited_candidate_border_color: 0xFFBBBC8F # 边框
    hilited_candidate_back_color: 0xFFBBBC8F   # 背景
    # hilited_candidate_shadow_color:        # 阴影
    # inline_preedit: false 时翻页箭头颜色，不设置则不显示箭头
    # nextpage_color: 0x000000               # 下一页
    # prevpage_color: 0x000000               # 上一页


  "preset_color_schemes/nord_dark": # 在 `style/color_schema` 指定的配色方案值
    name: "黑山／Nord Dark" # 方案设置中显示的配色名称
    author: aixmoyu # 配色作者名称
    color_format: abgr # 颜色格式：argb（0xaarrggbb）；rgba（0xrrggbbaa）；abgr（0xaabbggrr 默认）
    # 默认配色
    text_color: 0xE6FAF8F5 # 文字
    shadow_color: 0xB4B7B0A4 # 阴影
    label_color: 0xE6B7B0A4 # 标签
    comment_text_color: 0xE62E46E1 # 注释
    border_color: 0x80231F1B # 边框
    back_color: 0x80231F1B # 背景
    # 普通候选项配色
    # candidate_back_color: 0x80231F1B # 背景
    # candidate_border_color:                # 边框
    # candidate_shadow_color:                # 阴影
    candidate_text_color: 0xE6FAF8F5 # 文字
    # 编码区域配色
    hilited_text_color: 0xFFFAF8F5 # 文字
    hilited_back_color: 0xDD9E9F5F # 背景
    # hilited_shadow_color:                  # 阴影
    # 选中的候选区域配色
    hilited_mark_color: 0xFF2E46E1 # 标签前的标记
    hilited_label_color: 0xFFFAF8F5 # 标签
    hilited_comment_text_color: 0xFF2E46E1 # 注释
    hilited_candidate_text_color: 0xFFFAF8F5 # 文字
    hilited_candidate_border_color: 0xDD9E9F5F # 边框
    hilited_candidate_back_color: 0xDD9E9F5F # 背景
    # hilited_candidate_shadow_color:        # 阴影
    # inline_preedit: false 时翻页箭头颜色，不设置则不显示箭头
    # nextpage_color: 0x000000               # 下一页
    # prevpage_color: 0x000000               # 上一页