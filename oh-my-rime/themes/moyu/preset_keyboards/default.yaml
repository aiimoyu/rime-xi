#键盘布局
preset_keyboards:
  default:
    name: default
    ascii_mode: 0
    height: 46
    height_land: 34
    horizontal_gap: 6
    vertical_gap: 10
    vertical_gap_land: 4
    round_corner: 6
    key_text_offset_x: 0
    key_text_offset_y: 4
    key_press_text_offset_x: 0
    key_press_text_offset_y: 0
    key_upper_press_text_offset_x: 0
    key_upper_press_text_offset_y: 0
    key_upper_text_offset_x: 0
    key_upper_text_offset_y: 5
    key_down_text_offset_x: 0
    key_down_text_offset_y: -1
    key_down_press_text_offset_x: 0
    key_down_press_text_offset_y: 0
    preview_round_corner: 9
    long_preview_round_corner: 9
    long_preview_padding: 0
    long_preview_margin: 4
    preview: true
    shadow: { radius: 0.1, offsetX: 0, offsetY: 1.2, color: "#90949C" }
    menu:  { events: [ eisu_toggle_emoji, eisu_toggle_clip_board, eisu_toggle_cut_setting, eisu_toggle_clear_setting, function_rime_switcher ] }
    #现在只支持配置click,swipe_up,swipe_down键盘
    keys:
    # 1
    - { click: q, label: Q, swipe_up: commit_1, long_click: [ "①", "⒈" ] }
    - { click: w, label: W, swipe_up: commit_2, long_click: [ "②", "⒉" ] }
    - { click: e, label: E, swipe_up: commit_3, long_click: [ "③", "⒊" ] }
    - { click: r, label: R, swipe_up: commit_4, long_click: [ "④", "⒋" ] }
    - { click: t, label: T, swipe_up: commit_5, long_click: [ "⑤", "⒌" ] }
    - { click: y, label: Y, swipe_up: commit_6, long_click: [ "⑥", "⒍" ] }
    - { click: u, label: U, swipe_up: commit_7, long_click: [ "⑦", "⒎" ] }
    - { click: i, label: I, swipe_up: commit_8, long_click: [ "⑧", "⒏" ] }
    - { click: o, label: O, swipe_up: commit_9, long_click: [ "⑨", "⒐" ] }
    - { click: p, label: P, swipe_up: commit_0, long_click: [ "⓪", "⒑" ] }
    - { width: 5 }
    #2
    - { click: a, label: A, swipe_up: commit_half_tilde, swipe_down: commit_half_backtick, long_click: [ "~", "`" ] }
    - { click: s, label: S, swipe_up: commit_halfequal, swipe_down: commit_halfasterisk, long_click: [ "=", "*" ] }
    - { click: d, label: D, swipe_up: commit_halfslash, swipe_down: commit_halfbackslash, long_click: [ "/", "\\" ] }
    - { click: f, label: F, swipe_up: "commit_halfcolon", swipe_down: commit_fullcolon, long_click: [  ] }
    - { click: g, label: G, swipe_up: "commit_halfsemicolon", swipe_down: commit_fullsemicolon, long_click: [  ] }
    - { click: h, label: H, swipe_up: commit_half_leftparen, swipe_down: commit_full_leftparen, long_click: [ commit_half_leftbracket, "[" ] }
    - { click: j, label: J, swipe_up: commit_half_rightparen, swipe_down: commit_full_rightparen, long_click: [ commit_half_rightbracket, "]" ] }
    - { click: k, label: K, swipe_up: commit_halfdoublequote, swipe_down: commit_fullquotationmark_left, long_click: [ commit_half_leftbrace, "{" ] }
    - { click: l, label: L, swipe_up: commit_halfsinglequote, swipe_down: commit_fullquotationmark_right, long_click: [ commit_half_rightbrace, "}" ] }
    - { width: 5 }
    #3
    - { click: shift, has_menu: text_delimiter, width: 13, name: shift, preview: false }
    - { width: 2 }
    - { click: z, label: Z, swipe_up: commit_halfat, swipe_down: commit_halfpoundsign, long_click: [ "@", "#" ] }
    - { click: x, label: X, swipe_up: commit_halfdollar, swipe_down: commit_halfpercent, long_click: [ "$", "%" ] }
    - { click: c, label: C, swipe_up: "-", swipe_down: "_", long_click: [ ] }
    - { click: v, label: V, swipe_up: '^', swipe_down: commit_halfand, long_click: [  ] }
    - { click: b, label: B, swipe_up: "!", swipe_down: "?", long_click: [  ] }
    - { click: n, label: N, swipe_up: commit_half_comma, swipe_down: "，", long_click: [ commit_half_anglebracket_left, "<" ] }
    - { click: m, label: M, swipe_up: commit_halfperiod, swipe_down: "。", long_click: [  commit_half_anglebracket_right, ">" ] }
    - { width: 2 }
    - { click: backspace, width: 13, name: backspace, preview: false, swipe_up: function_keyboard_clearAll, swipe_down: function_keyboard_undo }
    #4
    - { click: eisu_toggle_符_symbols, width: 14, name: symbol, preview: false }
    - { click: eisu_toggle_123_number, has_menu: text_halfperiod, width: 13, name: number, preview: false }
    - { click: space, width: 38, name: space, swipe_up: select_second, preview: false }
    - { click: eisu_toggle_ABC_english, has_menu: text_halfcomma, width: 11, name: english, preview: false }
    - { click: return, width: 24, name: return, swipe_up: select_third, composing: confirm, long_click: [function_keyboard_clearAll, function_keyboard_clearLeft, function_keyboard_clearRight,  function_keyboard_undo, function_keyboard_redo, next], rect_preview: true, preview: false }
